# Low-dimensional diffusion policy config (1D Conv U-Net)
# Used by: python 06_train_policy.py --config configs/diffusion_policy.yaml

seed: 42

# Training
epochs: 100
batch_size: 64
learning_rate: 1.0e-4
weight_decay: 1.0e-6
num_workers: 0
grad_clip: 1.0
log_every: 5

# Data
checkpoint_dir: /tmp/cabinet_policy_checkpoints
max_episodes: null
include_augmented: true
require_augmented: true
include_all_lowdim: false

# Diffusion rollout geometry
horizon: 16
n_obs_steps: 2
n_action_steps: 8
num_diffusion_iters: 100
num_inference_iters: 16

# DDPM noise schedule
beta_start: 1.0e-4
beta_end: 2.0e-2

# 1D Conv U-Net architecture
base_channels: 128
channel_mults: [1, 2, 4]
num_res_blocks: 2
time_emb_dim: 128
cond_dim: 512
dropout: 0.0
